---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
- apiGroups:
  - agent-install.openshift.io
  resources:
  - agents
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - hypershift.openshift.io
  resources:
  - nodepools
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - inventory.example.io
  resources:
  - hostclaims
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - inventory.example.io
  resources:
  - hostclaims/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - inventory.example.io
  resources:
  - inventoryrecords
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - inventory.example.io
  resources:
  - inventoryrecords/status
  verbs:
  - patch
  - update
- apiGroups:
  - metal3.io
  resources:
  - baremetalhosts
  verbs:
  - get
  - list
  - watch
