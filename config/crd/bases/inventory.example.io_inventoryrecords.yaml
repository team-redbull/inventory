---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: inventoryrecords.inventory.example.io
spec:
  group: inventory.example.io
  names:
    kind: InventoryRecord
    listKind: InventoryRecordList
    plural: inventoryrecords
    shortNames:
    - inv
    singular: inventoryrecord
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.class
      name: Class
      type: string
    - jsonPath: .spec.placement.site
      name: Site
      type: string
    - jsonPath: .status.ownership.ownerMce
      name: Owner
      type: string
    - jsonPath: .status.ownership.leaseState
      name: Lease
      type: string
    - jsonPath: .status.allocation.hostedCluster
      name: HostedCluster
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: InventoryRecord is the canonical record for one bare-metal host.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              bmc:
                description: BMC connection coordinates.
                properties:
                  address:
                    type: string
                  bootMACAddress:
                    description: BootMACAddress is required for the IPMI+PXE method
                      (network boot NIC).
                    type: string
                  credentialsRef:
                    description: |-
                      CredentialsRef points at a Secret (created out-of-band via ESO/sealed
                      secret) holding the BMC username/password. Never inline the password.
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    type: object
                  type:
                    description: BMCType identifies the management controller dialect.
                    type: string
                type: object
              class:
                description: |-
                  Class optionally overrides automatic classification. If empty, the
                  classifier derives the class from the hardware profile and sets the
                  LabelClass label. If set, it wins and is mirrored to the label.
                type: string
              network:
                description: Network carries the L2 segment used as the move-eligibility
                  gate.
                properties:
                  leafHint:
                    description: |-
                      LeafHint is an optional operator-supplied leaf name, refined by the
                      switch topology collector.
                    type: string
                  segment:
                    description: |-
                      Segment is the L2/VLAN the provisioning NIC lives on. An IPMI+PXE host is
                      only movable to an MCE whose provisioning network serves this segment.
                    type: string
                type: object
              placement:
                description: |-
                  Placement holds declared PHYSICAL facts. Note: cluster is NOT here — the
                  cluster binding is an allocation outcome in status, not declared.
                properties:
                  homeMce:
                    type: string
                  rack:
                    type: string
                  role:
                    type: string
                  site:
                    type: string
                type: object
              serviceTag:
                description: |-
                  ServiceTag is the stable identity (Dell service tag / Cisco serial) used
                  to correlate this record with discovered hardware and with claims.
                type: string
              source:
                description: |-
                  Source names the collector responsible for primary discovery.
                  Metal3-managed hosts use "bmh"; non-Metal3 hosts use an aggregator/redfish.
                enum:
                - bmh
                - ome
                - intersight
                - ucscentral
                - redfish
                type: string
            required:
            - serviceTag
            - source
            type: object
          status:
            properties:
              allocation:
                description: Allocation is the current consumption outcome (which
                  cluster/claim/node).
                properties:
                  claimRef:
                    type: string
                  hostedCluster:
                    type: string
                  nodeName:
                    type: string
                  nodePool:
                    type: string
                type: object
              collection:
                properties:
                  lastError:
                    type: string
                  lastSuccess:
                    format: date-time
                    type: string
                  rawRef:
                    type: string
                  source:
                    description: CollectorSource identifies which backend produced
                      a record's status.
                    type: string
                type: object
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              ownership:
                description: |-
                  Ownership is a REFLECTED copy of the central lease for observability only;
                  the authoritative lease lives in the store.
                properties:
                  leaseState:
                    description: LeaseState mirrors the central store's ownership
                      state machine.
                    type: string
                  ownerMce:
                    type: string
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
