---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: hostclaims.inventory.example.io
spec:
  group: inventory.example.io
  names:
    kind: HostClaim
    listKind: HostClaimList
    plural: hostclaims
    shortNames:
    - hc
    singular: hostclaim
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetHostedCluster.name
      name: HostedCluster
      type: string
    - jsonPath: .status.desired
      name: Desired
      type: integer
    - jsonPath: .status.bound
      name: Bound
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.unsatisfiableReason
      name: Reason
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: HostClaim is a declarative request for N hosts of a class, bound
          to a HostedCluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              allowSpill:
                default: true
                description: |-
                  AllowSpill permits the fleet allocator to satisfy a shortfall by pulling
                  eligible hosts from other MCEs (the cross-MCE move path). Defaults true.
                  Set false to confine a claim to the target HostedCluster's own MCE.
                type: boolean
              count:
                description: Count is how many matching hosts to bind.
                format: int32
                minimum: 1
                type: integer
              nodePool:
                description: |-
                  NodePool optionally names which of the HostedCluster's NodePools to size.
                  If empty, the reconciler uses the cluster's default/worker NodePool.
                type: string
              selector:
                description: |-
                  Selector chooses candidate hosts by label. This spans the whole range:
                    - "any N of class a"  -> matchLabels{inventory.example.io/class: a}
                    - a specific host     -> a selector that matches exactly one host
                      (e.g. matchLabels on a unique tag) with count: 1.
                  A pinned (single-host) selector removes the allocator's freedom to
                  substitute, so it is the most likely to be Unsatisfiable.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              targetHostedCluster:
                description: |-
                  TargetHostedCluster is the HyperShift HostedCluster that consumes the
                  bound capacity. Its home MCE (the one hosting that control plane and
                  owning the BMHs) is DERIVED from this, not declared — that derived MCE is
                  the local-first target, and spill considers other MCEs.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - count
            - selector
            - targetHostedCluster
            type: object
          status:
            properties:
              bound:
                format: int32
                type: integer
              boundHosts:
                description: BoundHosts lists the service tags of hosts satisfying
                  this claim.
                items:
                  type: string
                type: array
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              desired:
                description: Desired echoes spec.count; Bound is how many are currently
                  bound.
                format: int32
                type: integer
              lastTransitionTime:
                description: LastTransitionTime is when Phase last changed.
                format: date-time
                type: string
              phase:
                description: Phase is the high-level satisfaction state.
                enum:
                - Pending
                - Satisfied
                - PartiallySatisfied
                - Unsatisfiable
                type: string
              unsatisfiableReason:
                description: |-
                  UnsatisfiableReason is set when the claim cannot be met, with a concrete
                  cause the team can act on, e.g.:
                    "no available host with class=a"
                    "1 candidate exists but its segment prov-vlan-220 is unreachable from mce-2"
                    "pinned host AB12CD3 is owned by workload-red and AllowSpill is false"
                  Never leave a claim silently Pending when it is actually impossible.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
