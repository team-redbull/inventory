<svg xmlns="http://www.w3.org/2000/svg" width="680" height="624" viewBox="0 0 680 624" role="img">
<title>Cross-MCE move flow with verification gates</title>
<desc>The overflow move lifecycle: deprovision and wipe in the source MCE, a teardown verification gate, release the lease to free, claim and provision in the target MCE, an install verification gate, and completion. A failed gate holds the lease rather than advancing.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
  .th{font-size:13px;font-weight:600;fill:#33322e;}
  .ts{font-size:11px;fill:#6b6a63;}
  .arr{stroke:#73726c;stroke-width:1.5;fill:none;}
  rect.c-teal,.c-teal>rect{fill:#dcece7;stroke:#6fa89a;}
  rect.c-amber,.c-amber>rect{fill:#f5ecd6;stroke:#c6a558;}
  rect.c-coral,.c-coral>rect{fill:#f4e1db;stroke:#c2897a;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect width="680" height="624" fill="#faf9f5"/>

<g class="c-coral"><rect x="180" y="44" width="320" height="56" rx="8" stroke-width="0.5"/></g>
<text class="th" x="340" y="66" text-anchor="middle" dominant-baseline="central">Deprovision + wipe</text><text class="ts" x="340" y="84" text-anchor="middle" dominant-baseline="central">source MCE releases node</text>
<line x1="340" y1="102" x2="340" y2="136" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber"><rect x="180" y="140" width="320" height="56" rx="8" stroke-width="1"/></g>
<text class="th" x="340" y="162" text-anchor="middle" dominant-baseline="central">Verify teardown (gate)</text><text class="ts" x="340" y="180" text-anchor="middle" dominant-baseline="central">disks clean · no orphans</text>
<line x1="340" y1="198" x2="340" y2="232" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral"><rect x="180" y="236" width="320" height="56" rx="8" stroke-width="0.5"/></g>
<text class="th" x="340" y="258" text-anchor="middle" dominant-baseline="central">Release lease → free</text><text class="ts" x="340" y="276" text-anchor="middle" dominant-baseline="central">single-writer handoff (CAS)</text>
<line x1="340" y1="294" x2="340" y2="328" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal"><rect x="180" y="332" width="320" height="56" rx="8" stroke-width="0.5"/></g>
<text class="th" x="340" y="354" text-anchor="middle" dominant-baseline="central">Claim + provision</text><text class="ts" x="340" y="372" text-anchor="middle" dominant-baseline="central">target MCE installs RHCOS</text>
<line x1="340" y1="390" x2="340" y2="424" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber"><rect x="180" y="428" width="320" height="56" rx="8" stroke-width="1"/></g>
<text class="th" x="340" y="450" text-anchor="middle" dominant-baseline="central">Verify install (gate)</text><text class="ts" x="340" y="468" text-anchor="middle" dominant-baseline="central">node ready · config applied</text>
<line x1="340" y1="486" x2="340" y2="520" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal"><rect x="180" y="524" width="320" height="56" rx="8" stroke-width="0.5"/></g>
<text class="th" x="340" y="546" text-anchor="middle" dominant-baseline="central">Move complete</text><text class="ts" x="340" y="564" text-anchor="middle" dominant-baseline="central">inventory store updated</text>

<rect class="c-coral" x="150" y="602" width="11" height="11" rx="3"/><text class="ts" x="167" y="608" dominant-baseline="central">source MCE</text>
<rect class="c-amber" x="300" y="602" width="11" height="11" rx="3"/><text class="ts" x="317" y="608" dominant-baseline="central">verification gate (fail → hold lease)</text>
<rect class="c-teal" x="540" y="602" width="11" height="11" rx="3"/><text class="ts" x="557" y="608" dominant-baseline="central">target MCE</text>
</svg>
