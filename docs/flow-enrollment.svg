<svg xmlns="http://www.w3.org/2000/svg" width="680" height="624" viewBox="0 0 680 624" role="img">
<title>Enrollment and discovery flow</title>
<desc>A host is discovered in a site, an eligible MCE is chosen by segment reach, the install WorkflowTemplate runs branching on boot method (Redfish virtual-media or IPMI plus PXE), Ironic inspects, the classifier stamps the class, and the host becomes spare in its home MCE.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
  .th{font-size:13px;font-weight:600;fill:#33322e;}
  .ts{font-size:11px;fill:#6b6a63;}
  .arr{stroke:#73726c;stroke-width:1.5;fill:none;}
  rect.c-teal,.c-teal>rect{fill:#dcece7;stroke:#6fa89a;}
  rect.c-blue,.c-blue>rect{fill:#dde6f1;stroke:#6f8fb2;}
  rect.c-amber,.c-amber>rect{fill:#f5ecd6;stroke:#c6a558;}
  rect.c-gray,.c-gray>rect{fill:#f0eee7;stroke:#b3b2aa;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect width="680" height="624" fill="#faf9f5"/>

<g class="c-gray"><rect x="170" y="44" width="340" height="56" rx="8" stroke-width="0.5"/></g>
<text class="th" x="340" y="66" text-anchor="middle" dominant-baseline="central">Discovered</text><text class="ts" x="340" y="84" text-anchor="middle" dominant-baseline="central">switch / OME / Intersight finds host</text>
<line x1="340" y1="102" x2="340" y2="136" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="170" y="140" width="340" height="56" rx="8" stroke-width="0.5"/></g>
<text class="th" x="340" y="162" text-anchor="middle" dominant-baseline="central">Choose MCE</text><text class="ts" x="340" y="180" text-anchor="middle" dominant-baseline="central">EligibleMCEs by segment reach</text>
<line x1="340" y1="198" x2="340" y2="232" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber"><rect x="170" y="236" width="340" height="56" rx="8" stroke-width="1"/></g>
<text class="th" x="340" y="258" text-anchor="middle" dominant-baseline="central">Install workflow (Argo)</text><text class="ts" x="340" y="276" text-anchor="middle" dominant-baseline="central">host-install WorkflowTemplate</text>
<line x1="340" y1="294" x2="340" y2="328" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="170" y="332" width="340" height="56" rx="8" stroke-width="0.5"/></g>
<text class="th" x="340" y="354" text-anchor="middle" dominant-baseline="central">Boot discovery ISO</text><text class="ts" x="340" y="372" text-anchor="middle" dominant-baseline="central">Redfish virtual-media  |  IPMI + PXE</text>
<line x1="340" y1="390" x2="340" y2="424" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="170" y="428" width="340" height="56" rx="8" stroke-width="0.5"/></g>
<text class="th" x="340" y="450" text-anchor="middle" dominant-baseline="central">Inspect + classify</text><text class="ts" x="340" y="468" text-anchor="middle" dominant-baseline="central">introspection → class label</text>
<line x1="340" y1="486" x2="340" y2="520" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal"><rect x="170" y="524" width="340" height="56" rx="8" stroke-width="0.5"/></g>
<text class="th" x="340" y="546" text-anchor="middle" dominant-baseline="central">Spare in home MCE</text><text class="ts" x="340" y="564" text-anchor="middle" dominant-baseline="central">gripped · claimable · counts as headroom</text>

<rect class="c-gray" x="150" y="602" width="11" height="11" rx="3"/><text class="ts" x="167" y="608" dominant-baseline="central">discovered</text>
<rect class="c-amber" x="290" y="602" width="11" height="11" rx="3"/><text class="ts" x="307" y="608" dominant-baseline="central">workflow</text>
<rect class="c-blue" x="420" y="602" width="11" height="11" rx="3"/><text class="ts" x="437" y="608" dominant-baseline="central">execution</text>
<rect class="c-teal" x="540" y="602" width="11" height="11" rx="3"/><text class="ts" x="557" y="608" dominant-baseline="central">ready</text>
</svg>
